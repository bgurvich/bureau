# Bureau — Nginx virtual host
# Single host (apex + www → apex redirect). Laravel doc root at __APP_DIR__/public.
#
# Placeholders — install.sh substitutes these when copying to /etc/nginx/sites-available/:
#   __DOMAIN__   bureau.homes
#   __APP_DIR__  /var/www/bureau
#   __PHP_VER__  8.3

map $host $bureau_canonical {
    www.__DOMAIN__ 1;
    default        0;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name __DOMAIN__ www.__DOMAIN__;

    ssl_certificate     /etc/ssl/bureau/fullchain.pem;
    ssl_certificate_key /etc/ssl/bureau/privkey.pem;

    # TLS hardening — AEAD ciphers only (GCM, CCM, CHACHA20), no CBC.
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    server_tokens off;

    # Defense-in-depth security headers. Laravel's SecurityHeaders middleware
    # sets these on PHP responses; declaring them at the nginx layer covers
    # static assets and the rare PHP error path that bails before middleware.
    # NOTE: nginx `add_header` does NOT inherit into nested `location` blocks
    # that declare their own add_header — blocks below re-declare as needed.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    root __APP_DIR__/public;
    index index.php;

    # Postmark inbound can carry multi-page PDF scans; mobile capture uploads
    # photos up to ~10 MB. 50M is the ceiling; php.ini post_max_size should match.
    client_max_body_size 50M;

    # Block direct access to the Laravel app tree. public/ is the only web root.
    location ~ /\. { deny all; }
    location ~ /(storage|bootstrap|config|database|routes|app|vendor)/ { deny all; }

    # www → apex
    if ($bureau_canonical) {
        return 301 https://__DOMAIN__$request_uri;
    }

    # Service worker must never be cached, or PWA updates stall until the user
    # manually clears site data. Browsers revalidate sw.js on each load.
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri /index.php?$query_string;
    }

    # PWA manifest — short cache so icon/name changes propagate within the hour.
    location = /manifest.webmanifest {
        add_header Cache-Control "public, max-age=3600" always;
        try_files $uri /index.php?$query_string;
    }

    # Let's Encrypt HTTP-01 (only reachable via the HTTPS block when nginx
    # keeps serving after cert issuance; the HTTP server below does the initial).
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    # Laravel router
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass   unix:/run/php/php__PHP_VER__-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        # OCR / heavy PDF parsing is a queue job (App\Jobs\OcrMedia) — never
        # blocks HTTP — so the read timeout stays modest.
        fastcgi_read_timeout 60;
    }

    # Livewire 3 asset + update endpoint. Must match before the static-asset
    # regex so the hashed /livewire-<hash>/... prefix isn't served as a file.
    location ~ ^/livewire[-/] {
        try_files $uri /index.php?$query_string;
    }

    # Vite hashed bundles — immutable, long cache.
    location ^~ /build/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Gated binary routes must hit PHP (download-gating guardrail). Use $uri as
    # the first try_files arg so matches fall through to the Laravel router.
    location ^~ /media/    { try_files $uri /index.php?$query_string; }
    location ^~ /document/ { try_files $uri /index.php?$query_string; }
    location ^~ /backup/   { try_files $uri /index.php?$query_string; }
    location ^~ /export/   { try_files $uri /index.php?$query_string; }

    # Public static assets (favicon, opengraph image, fonts shipped outside Vite).
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|woff2?)$ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri =404;
    }

    location = /robots.txt {
        access_log off;
        try_files $uri =404;
    }

    access_log /var/log/nginx/bureau.access.log;
    error_log  /var/log/nginx/bureau.error.log;
}

# HTTP → HTTPS. Also answers the ACME HTTP-01 challenge on port 80 so
# `certbot --webroot` can renew without stopping nginx.
server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__ www.__DOMAIN__;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://__DOMAIN__$request_uri;
    }
}
